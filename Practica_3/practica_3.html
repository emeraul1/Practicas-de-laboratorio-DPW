<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uso de contenedores DIV y SPAN</title>
    <style>

        body{
            font-family: Arial;
            background-color: #eaf4ff;
        }

        .contenedor{
            background-color: #1e3a8a;
            padding: 25px;
            width: 60%;
            margin: auto;
            border-radius: 10px;
        }

        .contenedor h1{
            color: #ffffff;
        }

        .contenedor p{
            color: #dbeafe;
            font-size: 18px;
        }

        .resaltar{
            color: #60a5fa;
            font-weight: bold;
        }

        .titulo-principal{
            text-align: center;
            color: #1e40af;
        }

    </style>
</head>
<body>
    <h1 class="titulo-principal"> 
    Uso de contenedores DIV y SPAN 
    </h1> 
        <div class="contenedor"> 
        <h2>Aprendiendo HTML</h2> 
        <p>
            En esta práctica estamos aprendiendo a utilizar 
            <span class="resaltar">DIV</span>
            para organizar el contenido de una página, y la etiqueta 
            <span class="resaltar">SPAN</span> 
            para resaltar palabras importantes dentro del texto usando 
            <span class="resaltar">CSS</span>. 
        </p> 
    </div>
</body>
</html>
